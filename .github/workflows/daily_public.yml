name: Daily Public Site

on:
  schedule:
    - cron: "30 9 * * 1-5"   # KST 18:30 평일 (장 마감 후 대시보드 발행 이후)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Build public site
        run: python scripts/build_public_site.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html reports/ sectors.html glossary.html about.html disclaimer.html privacy.html assets/
          git diff --cached --quiet || git commit -m "chore: 공개 리포트 갱신 $(date +%Y-%m-%d)"
          git push
